<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#112240"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#dbb876"/>
      <stop offset="50%" stop-color="#c9a96e"/>
      <stop offset="100%" stop-color="#a8873f"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Logo -->
  <text x="136" y="295" font-family="Amiri, Georgia, serif" font-size="304" fill="url(#gold)" text-anchor="start">دُعَاء</text>
  <text x="612" y="295" font-family="Cormorant Garamond, Georgia, serif" font-size="254" font-weight="300" font-style="italic" fill="#e8dcc8" text-anchor="start" letter-spacing="0.5">My</text>

  <!-- Tagline -->
  <text x="600" y="390" font-family="Cormorant Garamond, Georgia, serif" font-size="42" fill="#d4c9b4" text-anchor="middle" font-style="italic" opacity="0.8">A du'a lives deep in your heart.</text>
  <text x="600" y="445" font-family="Cormorant Garamond, Georgia, serif" font-size="42" fill="#d4c9b4" text-anchor="middle" font-style="italic" opacity="0.8">We help it find its words.</text>

  <!-- URL -->
  <text x="600" y="570" font-family="Cormorant Garamond, Georgia, serif" font-size="27" fill="#c9a96e" text-anchor="middle" letter-spacing="3" opacity="0.4">mydua.ai</text>
</svg>
